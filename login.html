<!DOCTYPE html>
<html lang="en" class="theme-original">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Amygdala — Login</title>
  <meta name="description" content="Log in to Amygdala. Gentle learning, then access your tools and progress." />

  <!-- Service worker -->
  <script src="sw-register.js"></script>

  <!-- Firebase boot -->
  <script type="module">
    import './firebase-init.js';
  </script>

  <!-- Global session bump listener -->
  <script type="module">
    import { auth, db } from './firebase-init.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const LOCAL_MARK = 'gs_session_ack_ts';

    onAuthStateChanged(auth, (user) => {
      if (!user) return;

      const uref = doc(db, 'users', user.uid);

      // Keep one live listener; Firebase will reuse the page.
      onSnapshot(uref, async (snap) => {
        const bump = snap?.data()?.sessionBumpedAt?.toMillis?.() || 0;
        if (!bump) return;

        // IMPORTANT: don’t force-logout the very first time we ever see a bump
        const seenRaw = localStorage.getItem(LOCAL_MARK);
        const seen = parseInt(seenRaw || '0', 10);

        if (!seenRaw) {
          localStorage.setItem(LOCAL_MARK, String(bump));
          return;
        }

        if (bump > seen) {
          localStorage.setItem(LOCAL_MARK, String(bump));
          try { await signOut(auth); } finally {
            // preserve whatever ?next=... was on the URL
            location.replace(`login.html${location.search || ""}`);
          }
        }
      });
    });
  </script>

  <!-- prefs bootstrap -->
  <script>
    (function () {
      const PREFS_KEY = 'gs_prefs';
      let p = {};
      try { p = JSON.parse(localStorage.getItem(PREFS_KEY) || '{}'); } catch { }
      document.documentElement.style.setProperty('--motion-scale', p.reducedMotion ? '0' : '1');
      document.documentElement.style.setProperty('--text-size', p.largerText ? '1.1rem' : '1rem');
    })();
  </script>

  <!-- PWA -->
  <meta name="theme-color" content="#6a5acd" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Manifest + icons (keep yours as-is) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" sizes="any" href="/-amygdala.io/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/amygdala.io/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/amygdala.io/favicon-16.png" />
  <link rel="apple-touch-icon" href="/amygdala.io/icon-192.png" />

  <!-- Fonts (match Learn) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Quicksand:wght@600;700&display=swap"
    rel="stylesheet">

  <!-- Your existing CSS -->
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./mainTheme.css" />

  <!-- ===== Early Theme Boot (same idea as learn/index) ===== -->
  <script>
    (function () {
      try {
        const root = document.documentElement;
        const userKey = localStorage.getItem("currentUser") || "anon";
        const savedTheme =
          localStorage.getItem(userKey + ":themeClass") ||
          localStorage.getItem("themeClass:last") ||
          "theme-original";

        const keep = (root.className || "")
          .split(/\s+/).filter(Boolean)
          .filter(c => !c.startsWith("theme-"));

        root.className = [...keep, savedTheme].join(" ");

        const meta = document.querySelector('meta[name="theme-color"]') || (function () {
          const m = document.createElement('meta'); m.name = 'theme-color'; document.head.appendChild(m); return m;
        })();
        const cs = getComputedStyle(root);
        meta.content = (cs.getPropertyValue('--accent-color') || cs.getPropertyValue('--accent') || '#6a5acd').trim() || '#6a5acd';
      } catch { }
    })();
  </script>

  <style>
    :root {
      --ink: rgba(10, 25, 30, .90);
      --muted: rgba(10, 25, 30, .62);
      --glass: rgba(255, 255, 255, .72);
      --glass2: rgba(255, 255, 255, .62);
      --border: rgba(0, 0, 0, .10);
      --shadow: 0 14px 40px rgba(0, 0, 0, .10);
      --radius: 20px;
      --radius-sm: 14px;
      --accent: var(--accent-color, #6a5acd);
    }

    html,
    body {
      height: 100%;
      font-family: "Open Sans", sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg,
          rgba(205, 177, 227, 0.68) 0%,
          rgb(42, 164, 195) 45%,
          rgba(255, 198, 224, .24) 100%) !important;
      -webkit-tap-highlight-color: transparent;
    }

    * {
      box-sizing: border-box;
    }

    /* App shell */
    .app {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      min-height: 100%;
      padding: 0 1rem calc(2.75rem + env(safe-area-inset-bottom));
    }

    .appbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding-top: env(safe-area-inset-top);
      backdrop-filter: blur(12px) saturate(1.1);
      background: linear-gradient(to bottom, rgba(255, 255, 255, .55), rgba(255, 255, 255, .15));
      border-bottom: 1px solid rgba(255, 255, 255, .40);
      margin: 0 -1rem .9rem;
      padding-left: 1rem;
      padding-right: 1rem;
    }

    .appbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      padding: .75rem 0;
    }

    .app-title {
      display: grid;
      line-height: 1.05;
    }

    .app-title .kicker {
      font-family: "Quicksand", sans-serif;
      font-weight: 900;
      letter-spacing: .4px;
      font-size: .9rem;
      opacity: .75;
    }

    .app-title .title {
      font-family: "Quicksand", sans-serif;
      font-weight: 900;
      letter-spacing: .3px;
      font-size: 1.15rem;
    }

    .pillrow {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, .65);
      color: var(--ink);
      font-weight: 900;
      padding: .55rem .8rem;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 10px 20px rgba(0, 0, 0, .06);
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      cursor: pointer;
    }

    .pill.primary {
      background: rgba(255, 255, 255, .80);
      border-color: rgba(0, 0, 0, .14);
    }

    /* Cards */
    .card {
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, .55);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(10px) saturate(1.1);
    }

    .pad {
      padding: 1rem;
    }

    .hero h1 {
      margin: 0 0 .35rem;
      font-weight: 900;
      font-size: 1.15rem;
      letter-spacing: .1px;
    }

    .hero p {
      margin: 0;
      font-weight: 700;
      color: var(--muted);
      line-height: 1.4;
    }

    /* Form */
    form {
      margin-top: .8rem;
      display: grid;
      gap: .75rem;
    }

    .field {
      display: grid;
      gap: .35rem;
    }

    label {
      font-weight: 900;
      font-size: .92rem;
      opacity: .9;
    }

    .input {
      width: 100%;
      padding: .78rem .9rem;
      border-radius: 16px;
      border: 1px solid rgba(0, 0, 0, .14);
      outline: none;
      background: rgba(255, 255, 255, .80);
      font-size: 1rem;
      color: var(--ink);
    }

    .input:focus {
      border-color: rgba(0, 0, 0, .28);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, .55);
    }

    .password-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .55rem;
      align-items: center;
    }

    .toggle-pass {
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, .14);
      background: rgba(255, 255, 255, .75);
      color: var(--ink);
      padding: .7rem .85rem;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 10px 18px rgba(0, 0, 0, .06);
    }

    .toggle-pass:active {
      transform: translateY(1px);
    }

    .btn {
      width: 100%;
      border: 1px solid rgba(0, 0, 0, .18);
      background: rgba(255, 255, 255, .78);
      color: var(--ink);
      font-weight: 900;
      padding: .85rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(0, 0, 0, .10);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }

    .btn.primary {
      background: rgba(255, 255, 255, .90);
      border-color: rgba(0, 0, 0, .18);
    }

    .btn:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    /* Message */
    #msg {
      margin-top: .75rem;
      padding: .65rem .75rem;
      border-radius: 14px;
      font-size: .92rem;
      font-weight: 850;
      display: none;
      border: 1px solid rgba(0, 0, 0, .10);
      background: rgba(255, 255, 255, .55);
      color: rgba(10, 25, 30, .78);
    }

    #msg.show {
      display: block;
    }

    #msg.msg-error {
      background: rgba(255, 0, 0, .08);
      border-color: rgba(185, 28, 28, .35);
      color: rgba(120, 16, 16, .92);
    }

    #msg.msg-ok {
      background: rgba(0, 200, 255, .10);
      border-color: rgba(0, 140, 170, .25);
      color: rgba(10, 70, 90, .92);
    }

    /* Links */
    .links {
      margin-top: .85rem;
      display: grid;
      gap: .6rem;
      font-weight: 850;
      color: var(--muted);
    }

    .links a {
      color: inherit;
      text-decoration: underline;
      opacity: .9;
    }

    .divider {
      height: 1px;
      background: rgba(0, 0, 0, .10);
      margin: 1rem 0 .75rem;
    }

    .smallprint {
      font-size: .85rem;
      font-weight: 750;
      opacity: .75;
      line-height: 1.35;
      text-align: center;
    }

    /* Safety: if global button styles try to force white text */
    button,
    .btn,
    .toggle-pass {
      color: var(--ink);
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="appbar">
      <div class="appbar-row">
        <div class="app-title">
          <div class="kicker">Amygdala</div>
          <div class="title">Log in</div>
        </div>

        <div class="pillrow">
          <a class="pill" href="./index.html">🏠 Home</a>
          <a class="pill primary" href="./learn.html">📘 Learn</a>
        </div>
      </div>
    </header>

    <section class="card hero">
      <div class="pad">
        <h1>Welcome back.</h1>
        <p>Sign in to continue your Amygdala planner.</p>

        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" class="input" placeholder="Email (required)" autocomplete="username"
              inputmode="email" required />
          </div>

          <div class="field">
            <label for="pass">Password</label>
            <div class="password-row">
              <input id="pass" type="password" class="input" placeholder="Password (required)"
                autocomplete="current-password" required />
              <button type="button" id="togglePass" class="toggle-pass" aria-pressed="false" aria-label="Show password">
                Show
              </button>
            </div>
          </div>

          <button id="loginBtn" type="submit" class="btn primary">🔐 Log in</button>
        </form>

        <div id="msg" aria-live="polite"></div>

        <div class="links">
          <div>
            Need to create an account?
            <a href="register.html" id="registerLink">Register here</a>
          </div>

          <div>
            <a href="#" id="forgotPassword">Forgot Password?</a>
          </div>

          <div class="divider"></div>

          <div class="smallprint">
            By logging in you agree to our
            <a href="privacy.html" rel="noopener">Privacy Policy</a>
            and
            <a href="terms.html" rel="noopener">Terms of Use</a>.
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- keep submit tying into loginBtn -->
  <script>
    document.getElementById('loginForm')?.addEventListener('submit', function (e) {
      e.preventDefault();
      document.getElementById('loginBtn')?.click();
    });

    // show / hide password
    (function () {
      const passInput = document.getElementById('pass');
      const toggleBtn = document.getElementById('togglePass');
      if (!passInput || !toggleBtn) return;

      toggleBtn.addEventListener('click', () => {
        const isHidden = passInput.type === 'password';
        passInput.type = isHidden ? 'text' : 'password';
        toggleBtn.textContent = isHidden ? 'Hide' : 'Show';
        toggleBtn.setAttribute('aria-pressed', String(isHidden));
        passInput.focus();
      });
    })();
  </script>

  <!-- ================= Firebase login logic (yours, preserved) ================= -->
  <script type="module">
    import { auth, db } from "./firebase-init.js";
    import {
      onAuthStateChanged,
      signInWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup,
      getRedirectResult,
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc, getDoc, setDoc, updateDoc,
      serverTimestamp, arrayUnion
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const log = (...a) => console.log("[login]", ...a);

    function goNext() {
      const qsNext = new URLSearchParams(location.search).get("next") || "";
      let next = qsNext || "index.html";

      // Only allow relative same-site navigation
      if (next.startsWith("http") || next.includes("//") || next.startsWith("javascript:")) {
        next = "index.html";
      }

      // Normalize
      if (!next.startsWith("./") && !next.startsWith("/")) next = "./" + next;

      log("redirect →", next);
      location.replace(next);
    }

    // keep ?next on Register link
    (function wireLinks() {
      const next = new URLSearchParams(location.search).get("next");
      const regLink = document.getElementById("registerLink");
      if (regLink) regLink.href = `register.html${next ? `?next=${encodeURIComponent(next)}` : ""}`;
    })();

    const emailEl = document.getElementById("email");
    const passEl = document.getElementById("pass");
    const btn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");

    const setMsg = (t, kind) => {
      if (!msg) return;
      msg.textContent = t || "";
      msg.classList.remove("msg-error", "msg-ok", "show");
      if (t) msg.classList.add("show");
      if (kind) msg.classList.add(kind);
    };

    [emailEl, passEl].forEach(el => el?.addEventListener("keydown", e => {
      if (e.key === "Enter") btn?.click();
    }));

    async function awardLoginBadge(uid) {
      const userRef = doc(db, "users", uid);
      await setDoc(userRef, { createdAt: serverTimestamp() }, { merge: true });

      await updateDoc(userRef, { badges: arrayUnion("login") }).catch(async (err) => {
        log("arrayUnion fell back (will merge set)", err?.code || err?.message);
        await setDoc(userRef, { badges: ["login"] }, { merge: true });
      });

      const badgeRef = doc(db, "users", uid, "badges", "login");
      const snap = await getDoc(badgeRef);
      if (!snap.exists()) {
        await setDoc(badgeRef, {
          key: "login",
          label: "First Login",
          emoji: "🔑",
          earnedAt: serverTimestamp()
        });
        log("created sub-badge doc");
      } else {
        log("sub-badge doc already existed");
      }
    }

    let awarding = false;
    async function ensureBadgeThenGo(user) {
      if (!user) return;
      if (awarding) return;
      awarding = true;
      try {
        log("awarding login badge for uid:", user.uid);
        await awardLoginBadge(user.uid);
        log("badge awarded");
      } catch (e) {
        console.error("[login] award error:", e);
      } finally {
        goNext();
      }
    }

    // email/password login
    btn?.addEventListener("click", async () => {
      try {
        setMsg("Signing in…");
        const email = (emailEl?.value || "").trim();
        const pass = passEl?.value || "";
        await signInWithEmailAndPassword(auth, email, pass);
        await ensureBadgeThenGo(auth.currentUser);
      } catch (err) {
        console.error(err);
        const code = err?.code || "";
        if (code === "auth/invalid-credential" || code === "auth/wrong-password") {
          setMsg("Incorrect email or password.", "msg-error");
        } else if (code === "auth/user-not-found") {
          setMsg("No account found with that email.", "msg-error");
        } else if (code === "auth/too-many-requests") {
          setMsg("Too many attempts. Please try again later.", "msg-error");
        } else {
          setMsg(err.message || "Sign-in failed.", "msg-error");
        }
      }
    });

    // optional Google button later
    const googleBtn = document.getElementById("googleSignIn");
    googleBtn?.addEventListener("click", async () => {
      setMsg("Signing in with Google…");
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
        await ensureBadgeThenGo(auth.currentUser);
      } catch (err) {
        console.error(err);
        setMsg(err.code || err.message, "msg-error");
      }
    });

    getRedirectResult(auth)
      .then(async (res) => { if (res?.user) await ensureBadgeThenGo(res.user); })
      .catch((err) => console.error(err));

    onAuthStateChanged(auth, async (u) => {
      if (u) {
        log("already signed in; ensuring badge");
        await ensureBadgeThenGo(u);
      }
    });

    // forgot password
    const forgotLink = document.getElementById("forgotPassword");
    forgotLink?.addEventListener("click", async (e) => {
      e.preventDefault();

      let email = (emailEl?.value || "").trim();
      if (!email) {
        email = prompt("Enter your registered email address:")?.trim() || "";
      }
      if (!email) {
        setMsg("Please enter your email address.", "msg-error");
        return;
      }

      try {
        setMsg("Sending reset link…");
        await sendPasswordResetEmail(auth, email);
        setMsg("✅ Reset link sent! Check your inbox (and spam).", "msg-ok");
      } catch (error) {
        console.error("Password reset error:", error);
        if (error.code === "auth/user-not-found") {
          setMsg("No account found with that email address.", "msg-error");
        } else if (error.code === "auth/invalid-email") {
          setMsg("Invalid email format. Please try again.", "msg-error");
        } else if (error.code === "auth/too-many-requests") {
          setMsg("Too many attempts. Try again later.", "msg-error");
        } else {
          setMsg("Something went wrong. Please try again.", "msg-error");
        }
      }
    });
  </script>
</body>

</html>
