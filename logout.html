<!DOCTYPE html>
<html lang="en" class="theme-original">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Amygdala — Logout</title>
    <meta name="description" content="Logging you out of Amygdala." />

    <!-- Service worker -->
    <script src="sw-register.js"></script>

    <!-- Firebase boot -->
    <script type="module">
        import "./firebase-init.js";
    </script>

    <!-- prefs bootstrap -->
    <script>
        (function () {
            const PREFS_KEY = 'gs_prefs';
            let p = {};
            try { p = JSON.parse(localStorage.getItem(PREFS_KEY) || '{}'); } catch { }
            document.documentElement.style.setProperty('--motion-scale', p.reducedMotion ? '0' : '1');
            document.documentElement.style.setProperty('--text-size', p.largerText ? '1.1rem' : '1rem');
        })();
    </script>

    <!-- PWA -->
    <meta name="theme-color" content="#6a5acd" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Manifest + icons (keep yours as-is) -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" sizes="any" href="/-amygdala.io/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/amygdala.io/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/amygdala.io/favicon-16.png" />
    <link rel="apple-touch-icon" href="/amygdala.io/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Quicksand:wght@600;700&display=swap"
        rel="stylesheet">

    <!-- Your existing CSS -->
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./mainTheme.css" />

    <!-- ===== Early Theme Boot (same idea as learn/login) ===== -->
    <script>
        (function () {
            try {
                const root = document.documentElement;
                const userKey = localStorage.getItem("currentUser") || "anon";
                const savedTheme =
                    localStorage.getItem(userKey + ":themeClass") ||
                    localStorage.getItem("themeClass:last") ||
                    "theme-original";

                const keep = (root.className || "")
                    .split(/\s+/).filter(Boolean)
                    .filter(c => !c.startsWith("theme-"));

                root.className = [...keep, savedTheme].join(" ");

                const meta = document.querySelector('meta[name="theme-color"]') || (function () {
                    const m = document.createElement('meta'); m.name = 'theme-color'; document.head.appendChild(m); return m;
                })();
                const cs = getComputedStyle(root);
                meta.content = (cs.getPropertyValue('--accent-color') || cs.getPropertyValue('--accent') || '#6a5acd').trim() || '#6a5acd';
            } catch { }
        })();
    </script>

    <style>
        :root {
            --ink: rgba(10, 25, 30, .90);
            --muted: rgba(10, 25, 30, .62);
            --glass: rgba(255, 255, 255, .72);
            --border: rgba(0, 0, 0, .10);
            --shadow: 0 14px 40px rgba(0, 0, 0, .10);
            --radius: 20px;
            --accent: var(--accent-color, #6a5acd);
        }

        html,
        body {
            height: 100%;
            font-family: "Open Sans", sans-serif;
            color: var(--ink);
            background: linear-gradient(135deg,
                    rgba(205, 177, 227, 0.68) 0%,
                    rgb(42, 164, 195) 45%,
                    rgba(255, 198, 224, .24) 100%) !important;
            -webkit-tap-highlight-color: transparent;
        }

        * {
            box-sizing: border-box;
        }

        .app {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            min-height: 100%;
            padding: 0 1rem calc(2.75rem + env(safe-area-inset-bottom));
        }

        .appbar {
            position: sticky;
            top: 0;
            z-index: 50;
            padding-top: env(safe-area-inset-top);
            backdrop-filter: blur(12px) saturate(1.1);
            background: linear-gradient(to bottom, rgba(255, 255, 255, .55), rgba(255, 255, 255, .15));
            border-bottom: 1px solid rgba(255, 255, 255, .40);
            margin: 0 -1rem .9rem;
            padding-left: 1rem;
            padding-right: 1rem;
        }

        .appbar-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: .75rem;
            padding: .75rem 0;
        }

        .app-title {
            display: grid;
            line-height: 1.05;
        }

        .app-title .kicker {
            font-family: "Quicksand", sans-serif;
            font-weight: 900;
            letter-spacing: .4px;
            font-size: .9rem;
            opacity: .75;
        }

        .app-title .title {
            font-family: "Quicksand", sans-serif;
            font-weight: 900;
            letter-spacing: .3px;
            font-size: 1.15rem;
        }

        .pillrow {
            display: flex;
            align-items: center;
            gap: .5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .pill {
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, .65);
            color: var(--ink);
            font-weight: 900;
            padding: .55rem .8rem;
            border-radius: 999px;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, .06);
            display: inline-flex;
            align-items: center;
            gap: .4rem;
        }

        .pill.primary {
            background: rgba(255, 255, 255, .80);
            border-color: rgba(0, 0, 0, .14);
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, .55);
            box-shadow: var(--shadow);
            border-radius: var(--radius);
            overflow: hidden;
            backdrop-filter: blur(10px) saturate(1.1);
        }

        .pad {
            padding: 1rem;
        }

        h1 {
            margin: 0 0 .35rem;
            font-weight: 900;
            font-size: 1.15rem;
            letter-spacing: .1px;
        }

        p {
            margin: 0;
            font-weight: 750;
            color: var(--muted);
            line-height: 1.4;
        }

        .row {
            display: flex;
            gap: .6rem;
            align-items: center;
            margin-top: .85rem;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border-radius: 999px;
            border: 3px solid rgba(0, 0, 0, .12);
            border-top-color: rgba(0, 0, 0, .55);
            animation: spin calc(.9s * var(--motion-scale)) linear infinite;
            flex: 0 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .small {
            margin-top: .85rem;
            font-size: .9rem;
            font-weight: 750;
            opacity: .8;
        }

        /* Safety: if global styles try to force white button text */
        button {
            color: var(--ink);
        }
    </style>
</head>

<body>
    <div class="app">
        <header class="appbar">
            <div class="appbar-row">
                <div class="app-title">
                    <div class="kicker">Amygdala</div>
                    <div class="title">Log out</div>
                </div>

                <div class="pillrow">
                    <a class="pill" href="./index.html">🏠 Home</a>
                    <a class="pill primary" href="./learn.html">📘 Learn</a>
                </div>
            </div>
        </header>

        <section class="card">
            <div class="pad">
                <h1>Logging you out… 💫</h1>
                <p>Hang tight. You’ll be back at the login screen in a moment.</p>

                <div class="row" aria-hidden="true">
                    <div class="spinner"></div>
                    <div class="small">Signing out securely…</div>
                </div>

                <div id="msg" class="small" style="display:none;"></div>
            </div>
        </section>
    </div>

    <script type="module">
        import { auth } from "./firebase-init.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const msg = document.getElementById("msg");
        const say = (t) => {
            if (!msg) return;
            msg.style.display = "block";
            msg.textContent = t;
        };

        // Where to go after logout (preserve ?next=)
        function goLogin() {
            const next = new URLSearchParams(location.search).get("next");
            location.replace(next ? `login.html?next=${encodeURIComponent(next)}` : "login.html");
        }

        let didRun = false;

        onAuthStateChanged(auth, async (user) => {
            if (didRun) return; // prevent double-fire weirdness
            didRun = true;

            try {
                if (user) {
                    await signOut(auth);
                }
            } catch (e) {
                console.error("[logout] signOut failed:", e);
                say("Logout had a hiccup, but we’ll send you to login.");
            } finally {
                // Clean up any legacy localStorage from old local auth
                try { localStorage.removeItem("currentUser"); } catch { }
                setTimeout(goLogin, 350);
            }
        });

        // Failsafe: if auth state never fires (rare), still navigate
        setTimeout(() => {
            if (!didRun) goLogin();
        }, 2000);
    </script>
</body>

</html>
