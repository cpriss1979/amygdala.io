<!DOCTYPE html>
<html lang="en" class="theme-original">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Amygdala — Register</title>
  <meta name="description" content="Create an Amygdala account so your wellness data stays saved and in sync." />

  <!-- Service worker -->
  <script src="sw-register.js"></script>

  <!-- Firebase boot -->
  <script type="module">
    import "./firebase-init.js";
  </script>

  <!-- prefs bootstrap -->
  <script>
    (function () {
      const PREFS_KEY = 'gs_prefs';
      let p = {};
      try { p = JSON.parse(localStorage.getItem(PREFS_KEY) || '{}'); } catch { }
      document.documentElement.style.setProperty('--motion-scale', p.reducedMotion ? '0' : '1');
      document.documentElement.style.setProperty('--text-size', p.largerText ? '1.1rem' : '1rem');
    })();
  </script>

  <!-- PWA -->
  <meta name="theme-color" content="#6a5acd" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Manifest + icons -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" sizes="any" href="/amygdala.io/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/amygdala.io/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/amygdala.io/favicon-16.png" />
  <link rel="apple-touch-icon" href="/amygdala.io/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&family=Quicksand:wght@600;700&display=swap"
    rel="stylesheet">

  <!-- Your existing CSS files -->
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="./mainTheme.css" />

  <!-- ===== Early Theme Boot ===== -->
  <script>
    (function () {
      try {
        const root = document.documentElement;
        const userKey = localStorage.getItem("currentUser") || "anon";
        const savedTheme =
          localStorage.getItem(userKey + ":themeClass") ||
          localStorage.getItem("themeClass:last") ||
          "theme-original";

        const keep = (root.className || "")
          .split(/\s+/).filter(Boolean)
          .filter(c => !c.startsWith("theme-"));

        root.className = [...keep, savedTheme].join(" ");

        const meta = document.querySelector('meta[name="theme-color"]') || (function () {
          const m = document.createElement('meta'); m.name = 'theme-color'; document.head.appendChild(m); return m;
        })();
        const cs = getComputedStyle(root);
        meta.content = (cs.getPropertyValue('--accent-color') || cs.getPropertyValue('--accent') || '#6a5acd').trim() || '#6a5acd';
      } catch { }
    })();
  </script>

  <style>
    :root {
      --ink: rgba(10, 25, 30, .90);
      --muted: rgba(10, 25, 30, .62);
      --glass: rgba(255, 255, 255, .72);
      --border: rgba(0, 0, 0, .10);
      --shadow: 0 14px 40px rgba(0, 0, 0, .10);
      --radius: 20px;
      --accent: var(--accent-color, #6a5acd);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      font-family: "Open Sans", sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg,
          rgba(205, 177, 227, 0.68) 0%,
          rgb(42, 164, 195) 45%,
          rgba(255, 198, 224, .24) 100%) !important;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
    }

    .app {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      min-height: 100%;
      padding: 0 1rem calc(2.75rem + env(safe-area-inset-bottom));
    }

    /* Sticky app header */
    .appbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding-top: env(safe-area-inset-top);
      backdrop-filter: blur(12px) saturate(1.1);
      background: linear-gradient(to bottom, rgba(255, 255, 255, .55), rgba(255, 255, 255, .15));
      border-bottom: 1px solid rgba(255, 255, 255, .40);
      margin: 0 -1rem .9rem;
      padding-left: 1rem;
      padding-right: 1rem;
    }

    .appbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      padding: .75rem 0;
    }

    .app-title {
      display: grid;
      line-height: 1.05;
    }

    .app-title .kicker {
      font-family: "Quicksand", sans-serif;
      font-weight: 900;
      letter-spacing: .4px;
      font-size: .9rem;
      opacity: .75;
    }

    .app-title .title {
      font-family: "Quicksand", sans-serif;
      font-weight: 900;
      letter-spacing: .3px;
      font-size: 1.15rem;
    }

    .pillrow {
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, .65);
      color: var(--ink);
      font-weight: 900;
      padding: .55rem .8rem;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 10px 20px rgba(0, 0, 0, .06);
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }

    .pill.primary {
      background: rgba(255, 255, 255, .80);
      border-color: rgba(0, 0, 0, .14);
    }

    /* Card */
    .card {
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, .55);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: blur(10px) saturate(1.1);
    }

    .pad {
      padding: 1rem;
    }

    h1 {
      margin: 0 0 .35rem;
      font-weight: 900;
      font-size: 1.15rem;
      letter-spacing: .1px;
    }

    .sub {
      margin: 0 0 .85rem;
      font-weight: 750;
      color: var(--muted);
      line-height: 1.4;
    }

    /* Form */
    form {
      margin: .35rem 0 0;
    }

    .field {
      display: grid;
      gap: .35rem;
      margin: .65rem 0;
    }

    label {
      font-weight: 850;
      font-size: .92rem;
      opacity: .92;
    }

    input {
      width: 100%;
      padding: .78rem .9rem;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, .14);
      outline: none;
      background: rgba(255, 255, 255, .80);
      font-size: 1rem;
    }

    input:focus {
      border-color: rgba(0, 0, 0, .28);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, .55);
    }

    .row {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      margin-top: .75rem;
    }

    .btn {
      border: 1px solid rgba(0, 0, 0, .22);
      background: rgba(255, 255, 255, .75);
      color: var(--ink);
      font-weight: 950;
      padding: .75rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .10);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
      flex: 1 1 160px;
    }

    .btn.primary {
      background: rgba(255, 255, 255, .88);
      border-color: rgba(0, 0, 0, .18);
    }

    .btn:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none !important;
    }

    .btn:active {
      transform: translateY(1px);
    }

    /* Message */
    #msg {
      margin-top: .75rem;
      font-weight: 850;
      padding: .65rem .75rem;
      border-radius: 14px;
      background: rgba(255, 255, 255, .55);
      border: 1px solid rgba(0, 0, 0, .10);
    }

    #msg:empty {
      padding: 0;
      border: none;
      margin-top: .25rem;
      background: transparent;
    }

    .msg-error {
      background: rgba(255, 0, 0, .08) !important;
      border-color: rgba(185, 28, 28, .35) !important;
      color: rgba(120, 10, 10, .92);
    }

    .msg-ok {
      background: rgba(0, 180, 200, .10) !important;
      border-color: rgba(0, 120, 140, .22) !important;
    }

    .links {
      margin-top: .85rem;
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
      font-weight: 850;
      font-size: .95rem;
    }

    .links a {
      color: inherit;
      text-decoration: underline;
      opacity: .9;
    }

    .smallprint {
      margin-top: 1rem;
      font-size: .9rem;
      font-weight: 750;
      opacity: .78;
      line-height: 1.4;
    }
  </style>

  <!-- Global session bump listener (keep, but don’t overreact) -->
  <script type="module">
    import { auth, db } from './firebase-init.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const LOCAL_MARK = 'gs_session_ack_ts';

    onAuthStateChanged(auth, (user) => {
      if (!user) return;

      const uref = doc(db, 'users', user.uid);

      onSnapshot(uref, async (snap) => {
        const bump = snap?.data()?.sessionBumpedAt?.toMillis?.() || 0;
        if (!bump) return;

        const seenRaw = localStorage.getItem(LOCAL_MARK);
        const seen = parseInt(seenRaw || '0', 10);

        if (!seenRaw) {
          localStorage.setItem(LOCAL_MARK, String(bump));
          return;
        }

        if (bump > seen) {
          localStorage.setItem(LOCAL_MARK, String(bump));
          try { await signOut(auth); } finally { location.replace(`login.html${location.search || ""}`); }
        }
      });
    });
  </script>

</head>

<body>
  <div class="app">
    <header class="appbar">
      <div class="appbar-row">
        <div class="app-title">
          <div class="kicker">Amygdala</div>
          <div class="title">Register</div>
        </div>

        <div class="pillrow">
          <a class="pill" href="./index.html">🏠 Home</a>
          <a class="pill primary" href="./learn.html">📘 Learn</a>
        </div>
      </div>
    </header>

    <section class="card">
      <div class="pad">
        <h1>Create your account</h1>
        <p class="sub">This keeps your tools and progress saved across devices.</p>

        <form id="registerForm" novalidate>
          <div class="field">
            <label for="name">Display name (optional)</label>
            <input id="name" type="text" placeholder="What should we call you?" autocomplete="name" />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="name@example.com" autocomplete="username" inputmode="email"
              required />
          </div>

          <div class="field">
            <label for="pass">Password</label>
            <input id="pass" type="password" placeholder="At least 6 characters" autocomplete="new-password" required />
          </div>

          <div class="row">
            <button id="registerBtn" type="submit" class="btn primary" disabled>✨ Register</button>
            <a id="loginLink" class="btn" href="login.html">Already have an account?</a>
          </div>
        </form>

        <div id="msg" aria-live="polite"></div>

        <div class="smallprint">
          By creating an account, you agree to our
          <a href="privacy.html" rel="noopener">Privacy Policy</a>
          and
          <a href="terms.html" rel="noopener">Terms of Use</a>.
        </div>
      </div>
    </section>
  </div>

  <!-- form submit → button click -->
  <script>
    document.getElementById('registerForm')?.addEventListener('submit', function (e) {
      e.preventDefault();
      document.getElementById('registerBtn')?.click();
    });
  </script>

  <!-- ================= Firebase register logic ================= -->
  <script type="module">
    import { auth, db } from "./firebase-init.js";
    import {
      setPersistence,
      browserLocalPersistence,
      createUserWithEmailAndPassword,
      updateProfile,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const $ = (id) => document.getElementById(id);
    const isEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

    const nameEl = $("name");
    const emailEl = $("email");
    const passEl = $("pass");
    const btn = $("registerBtn");
    const msg = $("msg");

    const setMsg = (text, kind) => {
      if (!msg) return;
      msg.textContent = text || "";
      msg.classList.remove("msg-error", "msg-ok");
      if (kind) msg.classList.add(kind);
    };

    // Carry ?next to login link
    const qsNext = new URLSearchParams(location.search).get("next");
    const loginLink = $("loginLink");
    if (loginLink) {
      loginLink.href = `login.html${qsNext ? `?next=${encodeURIComponent(qsNext)}` : ""}`;
    }

    const valid = () => isEmail((emailEl?.value || "").trim()) && (passEl?.value || "").length >= 6;

    const sync = () => {
      if (!btn) return;
      btn.disabled = !valid();
    };

    const showEmailHint = () => {
      const email = (emailEl?.value || "").trim();
      if (!email) { setMsg(""); return; }
      if (!isEmail(email)) {
        setMsg(
          email.includes("@")
            ? "Enter a valid email (e.g., name@example.com)."
            : "Please use your full email address (e.g., name@example.com).",
          "msg-error"
        );
      } else {
        setMsg("");
      }
    };

    const showPassHint = () => {
      const n = (passEl?.value || "").length;
      if (n > 0 && n < 6) {
        setMsg("Password must be at least 6 characters.", "msg-error");
      } else if (isEmail((emailEl?.value || "").trim())) {
        setMsg("");
      }
    };

    [nameEl, emailEl, passEl].forEach(el => el?.addEventListener("keydown", e => {
      if (e.key === "Enter") btn?.click();
    }));

    emailEl?.addEventListener("input", () => { sync(); if (msg.textContent) showEmailHint(); });
    emailEl?.addEventListener("blur", showEmailHint);

    passEl?.addEventListener("input", () => { sync(); showPassHint(); });
    passEl?.addEventListener("blur", showPassHint);

    sync();

    await setPersistence(auth, browserLocalPersistence);

    btn?.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!valid()) { showEmailHint(); showPassHint(); return; }

      try {
        setMsg("Creating account…");
        btn.disabled = true;

        const email = (emailEl.value || "").trim();
        const pass = passEl.value || "";
        const displayName = (nameEl.value || "").trim();

        const cred = await createUserWithEmailAndPassword(auth, email, pass);

        if (displayName) {
          try { await updateProfile(cred.user, { displayName }); } catch { }
        }

        // Ensure user doc and default theme
        await setDoc(
          doc(db, "users", cred.user.uid),
          { themeClass: "theme-original" },
          { merge: true }
        );

        const dest = qsNext || sessionStorage.getItem("postLoginRedirect") || "index.html";
        sessionStorage.removeItem("postLoginRedirect");
        location.assign(dest);
      } catch (err) {
        console.error(err);
        const code = err?.code || "";
        if (code === "auth/email-already-in-use") {
          setMsg("That email already has an account. Try logging in.", "msg-error");
        } else if (code === "auth/invalid-email") {
          setMsg("That email doesn’t look valid.", "msg-error");
        } else if (code === "auth/weak-password") {
          setMsg("Password is too weak. Use at least 6 characters.", "msg-error");
        } else {
          setMsg(err.message || "Registration failed.", "msg-error");
        }
        btn.disabled = false;
      }
    });

    onAuthStateChanged(auth, (u) => {
      console.log("[register] user:", u ? u.uid : "(none)");
    });
  </script>
</body>

</html>
