                .filter(Boolean)
                .filter((c) => !c.startsWith("theme-"));

        const COMFORT_VERSES = [
                "Cast all your anxiety on him because he cares for you. — 1 Peter 5:7",
                "Do not be anxious about anything... — Philippians 4:6",
                "The Lord is close to the brokenhearted... — Psalm 34:18",
                "The Lord will fight for you; you need only to be still. — Exodus 14:14",
                "Peace I leave with you; my peace I give you... — John 14:27",
                "Be still, and know that I am God. — Psalm 46:10",
                "Come to me, all you who are weary... — Matthew 11:28",
                "When I am afraid, I put my trust in you. — Psalm 56:3",
                "So do not fear, for I am with you... — Isaiah 41:10",
                "The Lord is good, a refuge in times of trouble. — Nahum 1:7",
            ];

    /* =================================== end of verse quotes =================================== */

    function pickRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // ---------------------------
    // UI
    // ---------------------------
    const quoteEl = document.getElementById("quote");
    const generateBtn = document.getElementById("generateBtn");
    const copyBtn = document.getElementById("copyBtn");
    const comfortSwitch = document.getElementById("comfortSwitch");

    function getComfortOnly() {
        const raw = localStorage.getItem(STORAGE.comfortOnly);
        // default ON for anxiety mode
        if (raw === null) return true;
        return raw === "1";
    }

    function setComfortOnly(on) {
        localStorage.setItem(STORAGE.comfortOnly, on ? "1" : "0");
    }

    function getActivePool() {
        return getComfortOnly() ? COMFORT_VERSES : ALL_VERSES;
    }

    function generateQuote() {
        const verse = pickRandom(getActivePool());
        quoteEl.textContent = verse;
        localStorage.setItem(STORAGE.lastVerse, verse);
    }

    async function copyQuote() {
        const text = quoteEl.textContent.trim();
        try {
            await navigator.clipboard.writeText(text);
            copyBtn.textContent = "✅ Copied!";
            setTimeout(() => (copyBtn.textContent = "📋 Copy"), 900);
        } catch {
            // fallback for older browsers
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            ta.remove();
            copyBtn.textContent = "✅ Copied!";
            setTimeout(() => (copyBtn.textContent = "📋 Copy"), 900);
        }
    }

    generateBtn.addEventListener("click", generateQuote);
    copyBtn.addEventListener("click", copyQuote);

    // Restore last verse if available, otherwise generate
    const last = localStorage.getItem(STORAGE.lastVerse);
    if (last) quoteEl.textContent = last;
    else generateQuote();

    // ---------------------------
        // Toggle (single switch only)
        // ---------------------------
        function updateSwitchUI(on) {
            if (!comfortSwitch) return;

            comfortSwitch.setAttribute("aria-checked", on ? "true" : "false");
            comfortSwitch.dataset.on = on ? "1" : "0";

            const comfortState = document.getElementById("comfortState");
            if (comfortState) comfortState.textContent = on ? "ON" : "OFF";
        }

        updateSwitchUI(getComfortOnly());

        if (!comfortSwitch) {
            console.warn("comfortSwitch not found (#comfortSwitch). Toggle disabled.");
        } else {
            comfortSwitch.addEventListener("click", (e) => {
                e.preventDefault();
                const next = !getComfortOnly(); // source of truth
                setComfortOnly(next);
                updateSwitchUI(next);
                generateQuote();
            });

            comfortSwitch.addEventListener("keydown", (e) => {
                if (e.key === "Enter" || e.key === " ") {
                    e.preventDefault();
                    const next = !getComfortOnly();
                    setComfortOnly(next);
                    updateSwitchUI(next);
                    generateQuote();
                }
            });
        }

        // ---------------------------
        // Toggle (switch + BOTH pills)
        // ---------------------------
        const modeComfortBtn = document.getElementById("modeComfort");
        const modeAllBtn = document.getElementById("modeAll");

        function updateModeUI(on) {
            // Switch UI
            if (comfortSwitch) {
                comfortSwitch.setAttribute("aria-checked", on ? "true" : "false");
                comfortSwitch.dataset.on = on ? "1" : "0";
            }

            // Pills UI (this is what you were missing)
            if (modeComfortBtn) {
                modeComfortBtn.classList.toggle("is-active", on);
                modeComfortBtn.setAttribute("aria-pressed", on ? "true" : "false");
            }
            if (modeAllBtn) {
                modeAllBtn.classList.toggle("is-active", !on);
                modeAllBtn.setAttribute("aria-pressed", on ? "false" : "true");
            }
        }

        function setMode(on) {
            setComfortOnly(on);     // source of truth
            updateModeUI(on);       // visuals
            generateQuote();        // show a verse from the right pool
        }

        // init UI from saved state
        updateModeUI(getComfortOnly());

        // Switch click
        if (comfortSwitch) {
            comfortSwitch.addEventListener("click", (e) => {
                e.preventDefault();
                setMode(!getComfortOnly());
            });

            // Keyboard accessibility (Enter/Space)
            comfortSwitch.addEventListener("keydown", (e) => {
                if (e.key === "Enter" || e.key === " ") {
                    e.preventDefault();
                    setMode(!getComfortOnly());
                }
            });
        }

        // Pills click
        if (modeComfortBtn) {
            modeComfortBtn.addEventListener("click", (e) => {
                e.preventDefault();
                setMode(true);
            });
        }
        if (modeAllBtn) {
            modeAllBtn.addEventListener("click", (e) => {
                e.preventDefault();
                setMode(false);
            });
        }

    // ---------------------------
    // Optional Firebase theme listen (if Firebase loaded)
    // ---------------------------
    if (auth && db && onAuthStateChanged && doc && onSnapshot) {
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                applyThemeClass(localStorage.getItem("themeClass:last") || "theme-original");
                return;
            }
            const ref = doc(db, "users", user.uid);
            onSnapshot(ref, (snap) => {
                const data = snap.data() || {};
                applyThemeClass(data.themeClass || "theme-original");
            });
        });
    } else {
        applyThemeClass(localStorage.getItem("themeClass:last") || "theme-original");
    }
    </script>
